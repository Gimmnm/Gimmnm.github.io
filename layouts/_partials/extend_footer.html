{{- /* Render math after KaTeX scripts load */ -}}
<script>
  (function () {
    var katexOpts = {
      delimiters: [
        { left: "$$", right: "$$", display: true },
        { left: "$", right: "$", display: false },
        { left: "\\(", right: "\\)", display: false },
        { left: "\\[", right: "\\]", display: true }
      ],
      throwOnError: false,
      strict: false,
      trust: true
    };

    function renderDisplayMath() {
      if (typeof katex === "undefined") return;

      document.querySelectorAll('script[type^="math/tex"]').forEach(function (el) {
        var tex = el.textContent.trim();
        if (!tex) return;
        try {
          katex.render(tex, el.parentElement, {
            displayMode: true,
            throwOnError: false,
            strict: false,
            trust: true
          });
          el.remove();
        } catch (err) {
          console.warn("KaTeX display error:", err);
        }
      });
    }

    function renderAllMath() {
      renderDisplayMath();
      if (typeof renderMathInElement === "function") {
        renderMathInElement(document.body, katexOpts);
      }
    }

    window.addEventListener("load", renderAllMath);
  })();
</script>
