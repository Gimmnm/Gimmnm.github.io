{{- /* Use Hugo's built-in TOC. PaperMod's findRE(.Content) path can panic
   with "slice bounds out of range" during hugo server rebuilds on some pages. */ -}}
{{- with .TableOfContents -}}
{{- if and . (ne . "<nav id=\"TableOfContents\"></nav>") -}}
<details class="toc"{{ if ($.Param "TocOpen") }} open{{ end }}>
    <summary accesskey="c" title="(Alt + C)">
        <span class="title">{{- i18n "toc" | default "Table of Contents" }}</span>
    </summary>
    <div class="inner">
        {{ . }}
    </div>
</details>
{{- end -}}
{{- end -}}
