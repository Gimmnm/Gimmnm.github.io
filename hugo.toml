baseURL = "https://gimmnm.github.io/"
title = "Gzh' Blog"
theme = "PaperMod"
locale = "en-us"
defaultContentLanguage = "en"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
pygmentsUseClasses = true

[params]
env = "production"
author = "Gzh"
description = "Learning notes on machine learning, mathematics, and related topics."
defaultTheme = "auto"
disableLangToggle = true
ShowReadingTime = true
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
disableSpecial1stPost = true
disableScrollToTop = false
comments = false
hidemeta = false
hideSummary = false
showtoc = true
tocopen = false
math = true

[params.homeInfoParams]
Title = "👋 Welcome to Gzh' Blog"
Content = """
Hi, this is Gzh. I document learning notes here — mostly machine learning, applied mathematics, and related topics.

Posts may be in **English** or **中文**, depending on the topic. No fixed pairing — just write in whichever language fits.
"""

[[menu.main]]
identifier = "posts"
name = "Posts"
url = "posts/"
weight = 10

[[menu.main]]
identifier = "archives"
name = "Archive"
url = "archives/"
weight = 20

[[menu.main]]
identifier = "tags"
name = "Tags"
url = "tags/"
weight = 30

[[menu.main]]
identifier = "search"
name = "Search"
url = "search/"
weight = 40

[[menu.main]]
identifier = "about"
name = "About"
url = "about/"
weight = 50

[[menu.main]]
identifier = "faq"
name = "FAQ"
url = "faq/"
weight = 60

[params.assets]
disableFingerprinting = true

[params.profileMode]
enabled = false

[params.cover]
hidden = true
hiddenInList = true
hiddenInSingle = true

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
unsafe = true

[markup.goldmark.extensions.passthrough]
enable = true

[markup.goldmark.extensions.passthrough.delimiters]
block = [['\[', '\]'], ['$$', '$$']]
inline = [['\(', '\)'], ['$', '$']]

[markup.highlight]
noClasses = false

[services]
[services.googleAnalytics]
ID = ""
