baseURL = "https://gimmnm.github.io/"
title = "PDE Dataset Docs"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
pygmentsUseClasses = true

defaultContentLanguage = "zh-cn"
defaultContentLanguageInSubdir = false

[params]
env = "production"
author = "Gzh"
defaultTheme = "light"
disableLangToggle = false
displayFullLangName = true
ShowReadingTime = false
ShowShareButtons = false
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
disableSpecial1stPost = true
disableScrollToTop = false
comments = false
hidemeta = true
hideSummary = false
showtoc = true
tocopen = false
math = true
mainSections = ["datasets"]

[params.label]
text = "PDE Dataset Docs"

[params.assets]
disableFingerprinting = true

[params.profileMode]
enabled = false

[params.cover]
hidden = true
hiddenInList = true
hiddenInSingle = true

[outputs]
home = ["HTML", "RSS", "JSON"]

[markup.goldmark.renderer]
unsafe = true

[markup.goldmark.extensions.passthrough]
enable = true

[markup.goldmark.extensions.passthrough.delimiters]
block = [['\[', '\]'], ['$$', '$$']]
inline = [['\(', '\)'], ['$', '$']]

[markup.highlight]
noClasses = false

[taxonomies]
tag = ""
category = ""

[services.googleAnalytics]
ID = ""

