Title = "PDE Dataset Docs"
Content = """
整理 PDEBench、The Well、PDEArena、CFDBench、PDEgym、FlowBench 等基准数据介绍。

每个页面包含一句话描述、控制方程、About the data、初边值条件、参数扫描与下载命令。

→ 从 [数据集总览](/datasets/) 开始浏览。右上角可切换 English。
"""

